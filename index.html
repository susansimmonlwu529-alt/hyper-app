<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyper Nutrition Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ЦВЕТОВАЯ ПАЛИТРА БРЕНДА */
        :root {
            --bg-main: #050505;
            --bg-card: #121212;
            --accent: #E60000;
            --accent-glow: rgba(230, 0, 0, 0.3);
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #222222;
        }

        /* БАЗОВЫЕ СТИЛИ */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            padding-bottom: 80px; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .brand-header {
            text-align: center; padding: 15px 0 5px 0; font-weight: 900; font-size: 1.5em;
            letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(180deg, rgba(230,0,0,0.15) 0%, rgba(5,5,5,0) 100%);
        }
        .brand-header span { color: var(--accent); }

        /* ПОИСКОВАЯ СТРОКА */
        .search-container {
            padding: 10px 15px;
            position: sticky;
            top: 0;
            background: var(--bg-main);
            z-index: 10;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            outline: none;
            box-sizing: border-box;
            font-size: 0.95em;
            transition: 0.3s;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        h2 { text-align: center; margin-top: 10px; font-size: 1.2em; color: var(--text-muted); font-weight: 500; }

        /* ПЛАВНОЕ ПОЯВЛЕНИЕ */
        .container { padding: 10px 15px; display: none; animation: slideFadeIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .active-view { display: block; }
        @keyframes slideFadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* СКЕЛЕТОНЫ (Анимация загрузки) */
        .skeleton {
            background: linear-gradient(90deg, #121212 25%, #222 50%, #121212 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* КАТЕГОРИИ */
        .category-scroll { display: flex; overflow-x: auto; padding: 5px 15px 15px 15px; gap: 10px; scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-chip { 
            background: var(--border-color); color: var(--text-muted); padding: 8px 18px; 
            border-radius: 20px; font-size: 0.85em; white-space: nowrap; cursor: pointer; transition: 0.3s; 
        }
        .cat-chip.active { background: var(--accent); color: #fff; font-weight: bold; box-shadow: 0 0 12px var(--accent-glow); }

        /* КАТАЛОГ И КАРТОЧКИ */
        .grid { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; padding: 0 15px; }
        .card { 
            background: var(--bg-card); border-radius: 12px; width: 48%; padding: 10px; 
            box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border-color); 
        }
        .card img { width: 100%; height: 120px; object-fit: contain; border-radius: 8px; background: #fff; margin-bottom: 10px; }
        .title { font-size: 0.9em; font-weight: bold; margin: 4px 0; color: var(--text-main); line-height: 1.2; }
        .desc { font-size: 0.75em; color: var(--text-muted); margin-bottom: 10px; flex-grow: 1; }
        .price { font-size: 1.1em; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        
        .btn { 
            background-color: var(--accent); color: #fff; border: none; border-radius: 8px; 
            padding: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; font-size: 0.9em; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.95); background-color: #cc0000; }
        .empty-state { text-align: center; width: 100%; padding: 40px 0; color: var(--text-muted); font-style: italic; }

        /* КОНТРОЛЛЕР КОЛИЧЕСТВА (- 1 +) */
        .qty-control {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-main); border: 1px solid var(--accent); border-radius: 8px; height: 36px; overflow: hidden;
        }
        .qty-btn {
            background: transparent; color: var(--accent); border: none; width: 35px; height: 100%;
            font-size: 1.2em; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:active { background: rgba(230,0,0,0.2); }
        .qty-val { font-weight: bold; color: #fff; font-size: 0.95em; }

        /* КОРЗИНА И ОФОРМЛЕНИЕ */
        .cart-item { 
            background: var(--bg-card); padding: 12px; border-radius: 10px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); 
        }
        .cart-item-title { font-size: 0.9em; color: var(--text-main); margin-bottom: 4px; line-height: 1.2;}
        .cart-item-price { font-size: 0.95em; color: var(--accent); font-weight: bold; }
        
        .cart-summary { background: #0a0a0a; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px dashed var(--border-color); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9em; }
        .summary-total { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); color: #fff; font-size: 1.2em; font-weight: bold; }
        
        .checkout-box { background: #0a0a0a; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .checkout-box h3 { margin-top: 0; color: var(--text-main); font-size: 1.1em; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85em; color: var(--text-muted); }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: var(--bg-card); color: #fff; box-sizing: border-box; font-size: 0.95em; outline: none; 
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
        
        .payment-info { 
            background: var(--bg-card); padding: 12px; border-radius: 8px; margin-top: 10px; 
            font-size: 0.85em; border-left: 4px solid var(--accent); display: none; color: #ccc; line-height: 1.4; 
        }
        .free-delivery-badge { color: #00ff00; font-weight: bold; font-size: 0.85em; margin-top: 4px; display: block;}

        /* КНОПКА ЗАКАЗА (Серая -> Красная) */
        #submit-order-btn {
            background-color: #222;
            color: #666;
            pointer-events: none;
            margin-top: 15px; 
            padding: 15px;
            transition: all 0.3s ease;
        }
        #submit-order-btn.ready {
            background-color: var(--accent);
            color: #fff;
            pointer-events: auto;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* БЛОК РЕКОМЕНДАЦИЙ (КРОСС-СЕЙЛ) */
        .recom-container {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }
        .recom-title {
            font-size: 0.95em;
            color: var(--text-main);
            margin-bottom: 12px;
            font-weight: bold;
        }
        .recom-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            scrollbar-width: none;
            padding-bottom: 5px;
        }
        .recom-scroll::-webkit-scrollbar { display: none; }
        .recom-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            min-width: 140px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .recom-card img { width: 100%; height: 80px; object-fit: contain; border-radius: 6px; background: #fff; margin-bottom: 8px;}
        .recom-card .r-title { font-size: 0.75em; font-weight: bold; color: #fff; margin-bottom: 5px; line-height: 1.2;}
        .recom-card .r-price { font-size: 0.9em; color: var(--accent); font-weight: bold; margin-bottom: 8px;}
        .recom-card .btn { padding: 6px; font-size: 0.75em; text-transform: none;}

        /* НИЖНЕЕ МЕНЮ НАВИГАЦИИ */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; 
            display: flex; justify-content: space-around; padding: 10px 0 25px 0; 
            border-top: 1px solid var(--border-color); z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); 
        }
        .nav-item { 
            color: var(--text-muted); text-align: center; font-size: 0.85em; cursor: pointer; 
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; 
        }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-icon { font-size: 1.6em; margin-bottom: 2px;}
        .badge { 
            background: var(--accent); color: #fff; font-size: 0.7em; padding: 2px 6px; 
            border-radius: 10px; font-weight: bold; margin-left: 4px; box-shadow: 0 0 5px var(--accent-glow);
        }
    </style>
</head>
<body>

    <div class="brand-header">HYPER <span>NUTRITION</span></div>

    <div id="view-catalog" class="container active-view" style="padding: 0;">
        
        <div class="search-container">
            <input type="text" id="search-box" class="search-input" placeholder="Поиск товара (напр. Maxler)..." oninput="filterProducts()">
        </div>

        <div class="category-scroll">
            <div class="cat-chip active" onclick="filterCategory('all', this)">Все</div>
            <div class="cat-chip" onclick="filterCategory('sport', this)">Спортпит</div>
            <div class="cat-chip" onclick="filterCategory('vitamins', this)">Витамины</div>
            <div class="cat-chip" onclick="filterCategory('sets', this)">Наборы</div>
            <div class="cat-chip" onclick="filterCategory('accessories', this)">Шейкеры</div>
        </div>

        <div class="grid" id="products-grid"></div>
    </div>

    <div id="view-cart" class="container">
        <h2>Оформление</h2>
        <div id="cart-items"></div>
        
        <div id="cart-summary-block" class="cart-summary" style="display:none;">
            <div class="summary-row"><span>Товары:</span> <span id="cart-subtotal">0 ₽</span></div>
            <div class="summary-row"><span>Доставка:</span> <span id="cart-delivery">0 ₽</span></div>
            <div class="summary-total"><span>Итого:</span> <span id="cart-total-price" style="color: var(--accent);">0 ₽</span></div>
        </div>
        
        <div id="checkout-form" class="checkout-box" style="display:none;">
            <h3>Куда доставляем?</h3>
            
            <div class="form-group">
                <label>Ваш город (обязательно):</label>
                <input type="text" id="city" placeholder="Например: Махачкала или Москва" oninput="checkCity()">
                <span id="free-delivery-msg" class="free-delivery-badge" style="display: none;">🎉 Доставка бесплатно!</span>
            </div>
            
            <div class="form-group">
                <label>Способ оплаты:</label>
                <select id="payment-method" onchange="togglePaymentInfo()">
                    <option value="none">Сначала введите город...</option>
                </select>
            </div>
            
            <div class="payment-info" id="transfer-details">
                <b>💳 Перевод по СБП:</b><br>
                Банки: Сбер, Тинькофф, ВТБ.<br><br>
                <i>Менеджер подтвердит наличие и пришлет точные реквизиты после оформления заявки.</i>
            </div>

            <button class="btn" id="submit-order-btn" onclick="submitOrder()">Сначала введите город</button>
            
            <div id="recommendations-block" class="recom-container" style="display:none;"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchView('catalog', this)">
            <span class="nav-icon">🛒</span>
            Каталог
        </div>
        <div class="nav-item" onclick="switchView('cart', this)">
            <span class="nav-icon">🛍</span>
            <div>Корзина<span class="badge" id="cart-badge">0</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        try { tg.setHeaderColor('#050505'); tg.setBackgroundColor('#050505'); } catch(e) {}

        const products = [
            { id: 1, name: "Maxler Whey Protein", desc: "30г белка в порции. Чистый рост.", price: 4500, category: "sport", img: "https://avatars.mds.yandex.net/get-mpic/16334824/2a0000019cb90d62208755f4e5073447de63/orig" },
            { id: 2, name: "Olimp Creatine", desc: "Взрывная сила и объем мышц.", price: 1900, category: "sport", img: "https://musculshop.ru/upload/resize_cache/webp/upload/medialibrary/96c/96cb81925e85e956d4405362c99fe907.webp" },
            { id: 3, name: "Olimp Beta-Alanine", desc: "Выносливость на тренировке.", price: 1300, category: "sport", img: "https://avatars.mds.yandex.net/get-mpic/14360956/2a000001985b640168766cbf93f4a38d843f/orig" },
            { id: 4, name: "Now Ultra Omega-3", desc: "Здоровье сердца и сосудов.", price: 2000, category: "vitamins", img: "https://ir.ozone.ru/s3/multimedia-1-b/c1000/7024575791.jpg" },
            { id: 5, name: "Now Vitamin D-3", desc: "Иммунитет и поддержка гормонов.", price: 1500, category: "vitamins", img: "https://main-cdn.sbermegamarket.ru/big1/hlr-system/1513778624/100023624315b0.jpg" },
            { id: 6, name: "Genetic Upgrade Set", desc: "Протеин + Креатин + Витамин D3.", price: 7500, category: "sets", img: "https://placehold.co/400x400/121212/E60000?text=HYPER+BUNDLE" }
        ];

        let cart = {}; 
        let currentCategory = 'all';
        let subtotal = 0;
        let deliveryFee = 0;
        
        // Память для умных рекомендаций
        let currentRecomIds = []; 

        function init() { 
            filterProducts(); 
        }

        function filterCategory(category, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentCategory = category;
            filterProducts();
        }

        function filterProducts() {
            const searchInput = document.getElementById('search-box');
            const searchQuery = searchInput ? searchInput.value.toLowerCase().trim() : '';
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                const matchesCategory = currentCategory === 'all' || p.category === currentCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery) || p.desc.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) { 
                grid.innerHTML = '<div class="empty-state">Ничего не найдено... 🔍<br><br><small>Попробуй изменить параметры поиска.</small></div>'; 
                return; 
            }

            filtered.forEach(p => {
                let qty = cart[p.id] || 0;
                
                let actionHtml = qty > 0 
                    ? `<div class="qty-control">
                           <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
                           <span class="qty-val">${qty}</span>
                           <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
                       </div>`
                    : `<button class="btn" onclick="updateQty(${p.id}, 1)">В корзину</button>`;

                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" class="skeleton" onload="this.classList.remove('skeleton')" alt="${p.name}">
                        <div class="title">${p.name}</div>
                        <div class="desc">${p.desc}</div>
                        <div class="price">${p.price} ₽</div>
                        ${actionHtml}
                    </div>`;
            });
        }

        function updateQty(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            
            if (cart[id] <= 0) delete cart[id];
            
            updateBadge();
            filterProducts(); 
            
            if (document.getElementById('view-cart').classList.contains('active-view')) {
                renderCart();
            }
        }

        function updateBadge() {
            let totalItems = 0;
            for(let id in cart) totalItems += cart[id];
            document.getElementById('cart-badge').innerText = totalItems;
        }

        function switchView(viewId, el) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active-view');
            el.classList.add('active');
            
            if(viewId === 'cart') {
                renderCart();
            }
        }

        function renderCart() {
            const cartDiv = document.getElementById('cart-items');
            cartDiv.innerHTML = '';
            subtotal = 0;
            
            if (Object.keys(cart).length === 0) {
                cartDiv.innerHTML = '<div class="empty-state">Ваша корзина пуста 🛒<br><br><small>Перейдите в каталог, чтобы добавить товары.</small></div>';
                document.getElementById('checkout-form').style.display = 'none';
                document.getElementById('cart-summary-block').style.display = 'none';
            } else {
                for(let id in cart) {
                    let p = products.find(x => x.id == id);
                    let qty = cart[id];
                    let cost = p.price * qty;
                    subtotal += cost;
                    
                    cartDiv.innerHTML += `
                        <div class="cart-item">
                            <div style="flex-grow: 1; padding-right: 10px;">
                                <div class="cart-item-title">${p.name}</div>
                                <div class="cart-item-price">${cost} ₽ <span style="color:#666; font-size:0.8em; font-weight:normal;">(${p.price} ₽/шт)</span></div>
                            </div>
                            <div class="qty-control" style="width: 85px; flex-shrink: 0;">
                                <button class="qty-btn" onclick="updateQty(${id}, -1)">-</button>
                                <span class="qty-val">${qty}</span>
                                <button class="qty-btn" onclick="updateQty(${id}, 1)">+</button>
                            </div>
                        </div>`;
                }
                document.getElementById('checkout-form').style.display = 'block';
                document.getElementById('cart-summary-block').style.display = 'block';
                checkCity(); 
                renderRecommendations(); 
            }
        }

        // УМНЫЕ РЕКОМЕНДАЦИИ (КРОСС-СЕЙЛ) БЕЗ МОРГАНИЯ
        function renderRecommendations() {
            const recomBlock = document.getElementById('recommendations-block');
            
            // Все товары, которых еще нет в корзине
            let available = products.filter(p => !cart[p.id]);
            
            if (available.length === 0) {
                recomBlock.style.display = 'none';
                currentRecomIds = [];
                return;
            }
            
            // Проверяем, актуальны ли наши текущие рекомендации (нет ли их уже в корзине)
            let stillValid = currentRecomIds.length > 0 && currentRecomIds.every(id => !cart[id]);
            
            // Если клиент добавил товар из рекомендаций в корзину, перемешиваем заново
            if (!stillValid) {
                available.sort(() => 0.5 - Math.random());
                currentRecomIds = available.slice(0, 3).map(p => p.id);
            }
            
            let suggested = products.filter(p => currentRecomIds.includes(p.id));
            
            recomBlock.style.display = 'block';
            let html = `<div class="recom-title">💡 С этим товаром берут:</div><div class="recom-scroll">`;
            
            suggested.forEach(p => {
                html += `
                    <div class="recom-card">
                        <img src="${p.img}" class="skeleton" onload="this.classList.remove('skeleton')" alt="${p.name}">
                        <div class="r-title">${p.name}</div>
                        <div class="r-price">${p.price} ₽</div>
                        <button class="btn" onclick="updateQty(${p.id}, 1)">+ Добавить</button>
                    </div>`;
            });
            html += `</div>`;
            recomBlock.innerHTML = html;
        }

        function checkCity() {
            const city = document.getElementById('city').value.trim().toLowerCase();
            const paySelect = document.getElementById('payment-method');
            const msgObj = document.getElementById('free-delivery-msg');
            const submitBtn = document.getElementById('submit-order-btn');
            
            paySelect.innerHTML = ''; 
            msgObj.style.display = 'none';
            
            if (city === '') {
                paySelect.innerHTML = '<option value="none">Сначала введите город...</option>';
                document.getElementById('transfer-details').style.display = 'none';
                deliveryFee = 0;
                
                // Кнопка серая
                submitBtn.classList.remove('ready');
                submitBtn.innerText = 'Сначала введите город';
            } else {
                // Кнопка красная (готова к отправке)
                submitBtn.classList.add('ready');
                submitBtn.innerText = 'Отправить заказ';

                if (city.includes('махачкала') || city === 'мхк') {
                    paySelect.innerHTML = `
                        <option value="Наличными">💵 Наличными курьеру</option>
                        <option value="Перевод СБП">💳 Перевод по СБП</option>`;
                    deliveryFee = 0; 
                    msgObj.style.display = 'block';
                    msgObj.innerText = '🚚 Бесплатная доставка курьером!';
                } else {
                    if (subtotal >= 5000) {
                        paySelect.innerHTML = `<option value="Перевод СБП">💳 Перевод по СБП (для отправки)</option>`;
                        deliveryFee = 0;
                        msgObj.style.display = 'block';
                        msgObj.innerText = '🎉 СДЭК/Почта России — Бесплатно!';
                    } else {
                        paySelect.innerHTML = `<option value="Перевод СБП">💳 Перевод по СБП (для отправки)</option>`;
                        deliveryFee = Math.round(subtotal * 0.10); 
                    }
                }
            }
            
            updateTotalDisplay();
            togglePaymentInfo();
        }

        function updateTotalDisplay() {
            document.getElementById('cart-subtotal').innerText = `${subtotal} ₽`;
            document.getElementById('cart-delivery').innerText = deliveryFee === 0 ? `Бесплатно` : `+ ${deliveryFee} ₽`;
            document.getElementById('cart-total-price').innerText = `${subtotal + deliveryFee} ₽`;
        }

        function togglePaymentInfo() {
            document.getElementById('transfer-details').style.display = document.getElementById('payment-method').value.includes('СБП') ? 'block' : 'none';
        }

        function submitOrder() {
            const city = document.getElementById('city').value.trim();
            if(!city) { 
                tg.showAlert("Бро, укажи город для расчета доставки!"); 
                return; 
            }

            const method = document.getElementById('payment-method').value;
            const finalTotal = subtotal + deliveryFee;
            
            let itemsList = [];
            for(let id in cart) {
                let p = products.find(x => x.id == id);
                itemsList.push(`${p.name} (x${cart[id]})`);
            }
            
            const orderData = {
                items: itemsList,
                subtotal: subtotal,
                delivery: deliveryFee,
                total: finalTotal,
                city: city,
                payment: method
            };

            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        init();
    </script>
</body>
</html>
